<HTML>
<BODY>

<script language="JavaScript">
    var D = new Date();

    document.write("<h2>Ngày hiện tại</h2>");
    document.write("Ngày: " + D.getDate() + "<br>");
    document.write("Tháng: " + (D.getMonth() + 1) + "<br>");
    document.write("Năm: " + D.getFullYear());
</script>

</BODY>
</HTML>
