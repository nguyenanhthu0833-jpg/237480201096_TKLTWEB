<html>
<head>
    <title>Bài tập JavaScript 1A</title>
</head>

<body>
<script language="JavaScript">
    // Khai báo biến
    var Ten, Tuoi;

    // Nhập dữ liệu
    Ten = prompt("Bạn hãy nhập vào tên:", "");
    Tuoi = prompt("Bạn hãy nhập vào tuổi:", 20);

    // Xuất ra màn hình
    document.write("Chào bạn: <b>" + Ten + "</b>");
    document.write("<br>");
    document.write("Tuổi của bạn là: <u>" + Tuoi + "</u>");
</script>
</body>
</html>
