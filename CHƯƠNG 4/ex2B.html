<html>
<head>
    <title>Bài tập JavaScript 2B</title>
</head>

<body>

<script language="JavaScript">
    document.write("<h2>Tạo button và textbox bằng JavaScript</h2>");
    document.write("<br>");
</script>

<form>
    <input type="text" name="txtthongbao">
    <br><br>

    <input type="button"
           name="Hello"
           value="Hello"
           onclick="txtthongbao.value='Hello JavaScript'">
</form>

</body>
</html>
