<html>
<head>
    <title>Bài tập JavaScript 2A</title>
</head>

<body>

<script language="JavaScript">
    // Tạo tiêu đề bằng document.write
    document.write("<h1>Tạo Button bằng Script</h1>");
    document.write("<br>");

    // Khai báo hàm thông báo
    function thongbao(txt)
    {
        alert(txt);
    }
</script>

<form>
    <input type="button"
           name="Thongbao"
           value="Thông báo"
           onclick="thongbao('Welcome to javascript!')">
</form>

</body>
</html>
