<html>
<head>
    <title>Bài tập JavaScript 1B</title>
</head>

<body>
<script language="JavaScript">
    // Khai báo biến
    var hoten, lop;

    // Nhập dữ liệu
    hoten = prompt("Nhập họ tên sinh viên:", "");
    lop = prompt("Nhập lớp:", "");

    // Xuất dữ liệu ra trang web
    document.write("<h1><font color='red'>TRƯỜNG ĐẠI HỌC BẠC LIÊU</font></h1>");
    document.write("<h2><font color='blue'>KHOA CÔNG NGHỆ THÔNG TIN</font></h2>");
    document.write("<b><font size='4' color='black'>Họ tên sinh viên: " + hoten + "</font></b><br>");
    document.write("<b><font size='4' color='green'>Lớp học: " + lop + "</font></b>");
</script>
</body>
</html>
